<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Powell | Rightful Returns Recovery — Digital Business Card</title>
  <meta name="description" content="Powell — Surplus Funds Recovery Specialist at Rightful Returns Recovery. Save contact or scan QR code.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C;
      --gold-light: #E8D5A3;
      --dark: #0D1B2A;
      --navy: #1B2A40;
      --light: #F5F0E8;
      --white: #FFFFFF;
      --card-bg: #132030;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--dark);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 48px;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.2);
    }

    /* Header band */
    .card-header {
      background: linear-gradient(135deg, #0a1520 0%, var(--navy) 60%, #1e3450 100%);
      padding: 32px 28px 0;
      text-align: center;
      border-bottom: 3px solid var(--gold);
      position: relative;
    }
    .card-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* Profile photo */
    .profile-wrap {
      width: 110px;
      height: 110px;
      margin: 0 auto 20px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
    }
    .profile-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: var(--dark);
      display: block;
    }
    .profile-initials {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 0.02em;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.02em;
      line-height: 1.15;
      margin-bottom: 6px;
    }
    .card-title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .card-company {
      font-size: 1rem;
      font-weight: 400;
      color: rgba(245,240,232,0.75);
      margin-bottom: 28px;
    }

    /* ── CONTACT LIST ── */
    .contact-list {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--light);
      transition: background 0.18s, color 0.18s;
      background: rgba(255,255,255,0.03);
    }
    .contact-item:hover, .contact-item:active {
      background: rgba(201,168,76,0.1);
      color: var(--gold);
    }
    .contact-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.15rem;
    }
    .contact-info { display: flex; flex-direction: column; min-width: 0; }
    .contact-label {
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 2px;
    }
    .contact-value {
      font-size: 0.97rem;
      font-weight: 400;
      color: var(--light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .contact-item:hover .contact-value { color: var(--gold); }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
      margin: 4px 20px;
    }

    /* ── SAVE CONTACT CTA ── */
    .cta-wrap { padding: 8px 20px 20px; }
    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--gold), #a8842a);
      color: var(--dark);
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      text-decoration: none;
    }
    .btn-save:hover { opacity: 0.88; }
    .btn-save:active { transform: scale(0.98); }
    .btn-save svg { flex-shrink: 0; }

    /* ── QR CODE SECTION ── */
    .qr-section {
      padding: 0 20px 28px;
      text-align: center;
    }
    .qr-label {
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(201,168,76,0.6);
      margin-bottom: 16px;
    }
    .qr-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #qr-canvas { display: block; }

    /* ── FOOTER NOTE ── */
    .card-footer {
      padding: 16px 20px 20px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .card-footer p {
      font-size: 0.72rem;
      color: rgba(245,240,232,0.35);
      letter-spacing: 0.5px;
      line-height: 1.6;
    }
    .card-footer a { color: rgba(201,168,76,0.5); text-decoration: none; }
    .card-footer a:hover { color: var(--gold); }

    /* ── PRINT BUTTON (hidden on mobile, visible on desktop) ── */
    .print-btn {
      margin-top: 20px;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 8px;
      background: transparent;
      color: var(--gold);
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .print-btn:hover { background: rgba(201,168,76,0.08); }
    @media (min-width: 600px) { .print-btn { display: flex; } }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a3a28;
      border: 1px solid #2e7d52;
      color: #4ade80;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Header -->
    <div class="card-header">
      <div class="profile-wrap">
        <!-- Replace src with your personal photo URL, e.g. src="your-photo.jpg" -->
        <img
          id="profile-photo"
          class="profile-img"
          src="logo.png"
          alt="Powell — Rightful Returns Recovery"
          onerror="this.style.display='none'; document.getElementById('profile-initials').style.display='flex';"
        >
        <div id="profile-initials" class="profile-initials" style="display:none;">P</div>
      </div>

      <div class="card-name">Powell</div>
      <div class="card-title">Surplus Funds Recovery Specialist</div>
      <div class="card-company">Rightful Returns Recovery</div>
    </div>

    <!-- Contact rows -->
    <div class="contact-list">

      <a class="contact-item" href="tel:+18004282022">
        <div class="contact-icon">📞</div>
        <div class="contact-info">
          <span class="contact-label">Toll-Free</span>
          <span class="contact-value">1 (800) 428-2022</span>
        </div>
      </a>

      <a class="contact-item" href="mailto:powell@rightfulreturnsrecovery.com">
        <div class="contact-icon">✉️</div>
        <div class="contact-info">
          <span class="contact-label">Email</span>
          <span class="contact-value">powell@rightfulreturnsrecovery.com</span>
        </div>
      </a>

      <div class="divider"></div>

      <a class="contact-item" href="https://www.rightfulreturnsrecovery.com" target="_blank" rel="noopener">
        <div class="contact-icon">🌐</div>
        <div class="contact-info">
          <span class="contact-label">Website</span>
          <span class="contact-value">rightfulreturnsrecovery.com</span>
        </div>
      </a>

    </div>

    <!-- Save Contact CTA -->
    <div class="cta-wrap">
      <button class="btn-save" id="save-contact-btn" onclick="saveContact()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Save to Contacts
      </button>
    </div>

    <!-- QR Code -->
    <div class="qr-section">
      <div class="qr-label">Scan to share this card</div>
      <div class="qr-box">
        <canvas id="qr-canvas"></canvas>
      </div>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      <p>
        No upfront fees &mdash; Contingency only<br>
        <a href="https://www.rightfulreturnsrecovery.com">rightfulreturnsrecovery.com</a>
      </p>
    </div>

  </div>

  <!-- Print button (desktop only) -->
  <button class="print-btn" onclick="window.print()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
    Print / Save as PDF
  </button>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script>
    /* ── vCard download ── */
    function saveContact() {
      const vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'N:;Powell;;;',
        'FN:Powell',
        'ORG:Rightful Returns Recovery',
        'TITLE:Surplus Funds Recovery Specialist',
        'TEL;TYPE=WORK,VOICE:+18004282022',
        'EMAIL;TYPE=WORK:powell@rightfulreturnsrecovery.com',
        'URL:https://www.rightfulreturnsrecovery.com',
        'NOTE:No upfront fees. Contingency only. Free case review.',
        'END:VCARD'
      ].join('\r\n');

      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      // iOS/Android: try opening the .vcf directly so the OS handles it
      const a = document.createElement('a');
      a.href = url;
      a.download = 'Powell-RightfulReturnsRecovery.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 2000);

      showToast('✓ Contact file downloaded — open it to save');
    }

    /* ── Toast helper ── */
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3200);
    }

    /* ── QR Code ── */
    (function generateQR() {
      const pageUrl = 'https://www.rightfulreturnsrecovery.com/business-card.html';
      const canvas = document.getElementById('qr-canvas');
      QRCode.toCanvas(canvas, pageUrl, {
        width: 180,
        margin: 0,
        color: {
          dark: '#0D1B2A',
          light: '#FFFFFF'
        }
      }, function(err) {
        if (err) console.warn('QR generation error:', err);
      });
    })();
  </script>

</body>
</html>
